<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Columns</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .table-container {
            max-height: 300px;
            overflow: auto;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="mb-4">
        <h2>📊 Preview & Select Columns</h2>
        <p class="text-muted">Review your data and choose what to keep</p>
    </div>

    <!-- Preview -->
    <div class="card p-3 mb-4">
        <h5>Preview</h5>
        <div class="table-container">
            {{ preview | safe }}
        </div>
    </div>

    <!-- Column selection -->
    <div class="card p-4">
        <form method="POST" action="/process">

            <input type="hidden" name="filename" value="{{ filename }}">

            <div class="row">
                {% for col in columns %}
                <div class="col-md-3 mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="columns" value="{{ col }}">
                        <label class="form-check-label">{{ col }}</label>
                    </div>
                </div>
                {% endfor %}
            </div>

            <hr>

            <!-- Counter -->
            <p id="counter" class="text-muted">0 columns selected</p>

            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-outline-secondary">⬅ Back</a>
                <button class="btn btn-success btn-lg">Download Clean File ⬇️</button>
            </div>

        </form>
    </div>

</div>

<script>
const checkboxes = document.querySelectorAll('input[name="columns"]');
const counter = document.getElementById('counter');

checkboxes.forEach(cb => {
    cb.addEventListener('change', () => {
        const selected = document.querySelectorAll('input[name="columns"]:checked').length;
        counter.textContent = selected + " columns selected";
    });
});
</script>

</body>
</html>
