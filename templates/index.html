<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Cleaner</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover {
            border-color: #0d6efd;
            background: #f8f9ff;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="text-center mb-4">
        <h1>🧹 Data Cleaner</h1>
        <p class="text-muted">Upload your CSV or Excel file and clean it instantly</p>
    </div>

    <div class="card p-4">
        <form method="POST" enctype="multipart/form-data">
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p class="mb-2">📂 Click or drag your file here</p>
                <small class="text-muted">CSV or XLSX</small>
                <input id="fileInput" type="file" name="file" hidden required>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary btn-lg">
                    Upload File 🚀
                </button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
